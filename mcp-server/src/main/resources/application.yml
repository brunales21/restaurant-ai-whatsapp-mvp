spring:
  application:
    name: restaurant-mcp-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurantdb}
    username: ${DB_USERNAME:restaurant}
    password: ${DB_PASSWORD:restaurant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: always
  ai:
    mcp:
      server:
        enabled: true
        protocol: STREAMABLE
        name: restaurant-mcp-server
        version: 0.0.1
        type: SYNC
        instructions: "Servidor MCP de restaurante: expone tools para consultar menús y gestionar reservas."
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
