spring:
  application:
    name: restaurant-ai-whatsapp-mvp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurantdb}
    username: ${DB_USERNAME:restaurant}
    password: ${DB_PASSWORD:restaurant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: always
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: ${SERVER_PORT:8080}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-number: ${TWILIO_WHATSAPP_NUMBER:+14155238886}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
