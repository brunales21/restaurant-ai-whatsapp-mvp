spring:
  application:
    name: restaurant-ai-whatsapp-mvp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/restaurantdb}
    username: ${DB_USERNAME:restaurant}
    password: ${DB_PASSWORD:restaurant}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: always
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: ${SERVER_PORT:8080}

whatsapp:
  api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v22.0}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  access-token: ${WHATSAPP_ACCESS_TOKEN:}
  verify-token: ${WHATSAPP_VERIFY_TOKEN:change-me}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
